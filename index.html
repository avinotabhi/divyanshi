document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sor fit: Smartlead, OpenClaw<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SECTION 3: THE REAL CASE -->\n<section class=\"math-section\">\n  <div class=\"section-label reveal\" data-num=\"03\">The Real Case<\u002Fdiv>\n  <h2 class=\"reveal reveal-d1\">YouTube Is a Search Engine.<br>LinkedIn Is a Feed.<br>One of These Works While You Sleep.<\u002Fh2>\n  <p class=\"reveal reveal-d2\">The difference isn't content format — it's intent. And intent shapes how people perceive you.<\u002Fp>\n\n  <div class=\"math-grid reveal reveal-d3\">\n    <div class=\"math-card now\">\n      <div class=\"math-label\">LinkedIn + Instagram · How People Find You<\u002Fdiv>\n      <div class=\"math-title\">Passive Discovery<\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">Someone scrolling their feed<\u002Fspan>\n        <span class=\"amount\">→ sees your post<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">Algorithm decides who sees it<\u002Fspan>\n        <span class=\"amount\">→ you don't<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">Content lifespan<\u002Fspan>\n        <span class=\"amount\">24–72 hrs<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">Audience mindset<\u002Fspan>\n        <span class=\"amount\">browsing<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-total\">\n        <span class=\"total-label\">Audience mindset<\u002Fspan>\n        <span class=\"total-num\" style=\"font-size:20px; color: var(--muted);\">Passive<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"math-card with-youtube\">\n      <div class=\"math-label\">YouTube · How People Find You<\u002Fdiv>\n      <div class=\"math-title\">Active Discovery<\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">Someone searches \"AI lead gen system 2026\"<\u002Fspan>\n        <span class=\"amount big\">→ finds you<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">They chose to watch 12 minutes<\u002Fspan>\n        <span class=\"amount\">→ high trust<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">Content lifespan<\u002Fspan>\n        <span class=\"amount\">2–5 years<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-row\">\n        <span class=\"platform\">Audience mindset<\u002Fspan>\n        <span class=\"amount\">solving a problem<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"math-total\">\n        <span class=\"total-label\">Audience mindset<\u002Fspan>\n        <span class=\"total-num green\">Active<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p class=\"reveal reveal-d4\" style=\"text-align:left; font-style:normal; font-size:14px; color:#444; max-width:640px; margin-top: 28px;\">\n    The person who finds your video by searching \"how to build a cold outreach AI system\" already knows they have a problem. They've self-selected. They watch 10–15 minutes of you explaining it with depth and precision — and by the end, you're not a LinkedIn creator they follow. You're the expert they trust. That's a level of authority LinkedIn structurally cannot build.\n  <\u002Fp>\n\n  <div class=\"insight-box reveal reveal-d5\" style=\"margin-top: 24px;\">\n    <strong>The compounding effect:<\u002Fstrong> A video you record in June 2026 on \"AI agent stacks for GTM teams\" gets found in March 2028 by a SaaS founder who just got a new budget. They watch it, they visit growthexe.info, they know exactly who you are and what you stand for. You did nothing. That's what a search engine does — LinkedIn does not.\n  <\u002Fdiv>\n\n  <div class=\"reveal\" style=\"margin-top: 36px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--rule); border: 1px solid var(--rule);\">\n    <div style=\"background: var(--paper); padding: 24px; text-align:center;\">\n      <div style=\"font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:8px;\">Authority<\u002Fdiv>\n      <div style=\"font-family:'Playfair Display',serif; font-size:22px; font-weight:900; line-height:1.1; margin-bottom:6px;\">Own a<br>Niche<\u002Fdiv>\n      <div style=\"font-size:12px; color:var(--muted);\">In the B2B GTM/AI space on YouTube, almost nobody is making technical, systems-level content. You could own that position.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background: var(--paper); padding: 24px; text-align:center; border-left: 1px solid var(--rule); border-right: 1px solid var(--rule);\">\n      <div style=\"font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:8px;\">Discoverability<\u002Fdiv>\n      <div style=\"font-family:'Playfair Display',serif; font-size:22px; font-weight:900; line-height:1.1; margin-bottom:6px;\">Search<br>Equity<\u002Fdiv>\n      <div style=\"font-size:12px; color:var(--muted);\">Every video adds to a library that compounds. 30 videos = 30 permanent entry points for people to discover Growth Exe — forever.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background: var(--paper); padding: 24px; text-align:center;\">\n      <div style=\"font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:8px;\">Trust<\u002Fdiv>\n      <div style=\"font-family:'Playfair Display',serif; font-size:22px; font-weight:900; line-height:1.1; margin-bottom:6px;\">12-Minute<br>Warmup<\u002Fdiv>\n      <div style=\"font-size:12px; color:var(--muted);\">Someone who watches a full tutorial trusts you at a level no LinkedIn post or Instagram reel can replicate. Video builds people.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SECTION 4: HOW IT WORKS -->\n<section class=\"process-section\">\n  <div class=\"section-label reveal\" data-num=\"04\">The Setup<\u002Fdiv>\n  <h2 class=\"reveal reveal-d1\">What Full YouTube Management Looks Like<\u002Fh2>\n  <p class=\"reveal reveal-d2\">Zero additional time from you beyond recording. Everything else is handled.<\u002Fp>\n\n  <div class=\"process-steps\">\n    <div class=\"process-step reveal\">\n      <div class=\"step-num\">01<\u002Fdiv>\n      <div class=\"step-content\">\n        <div class=\"step-title\">You Record. That's It.<\u002Fdiv>\n        <div class=\"step-desc\">We turn your existing LinkedIn posts, Substack guides, and webinar recordings into structured video scripts. You receive a teleprompter-ready script and a shot list. You record. We handle everything after.<\u002Fdiv>\n        <div class=\"step-detail\">avg. 45–60 min recording time per video<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-step reveal reveal-d1\">\n      <div class=\"step-num\">02<\u002Fdiv>\n      <div class=\"step-content\">\n        <div class=\"step-title\">Full Post-Production<\u002Fdiv>\n        <div class=\"step-desc\">Editing, captions, B-roll, screen recordings, motion graphics for your workflow diagrams. Output: a polished video that matches your existing visual brand on LinkedIn and Instagram.<\u002Fdiv>\n        <div class=\"step-detail\">3-4 day turnaround per video<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-step reveal reveal-d2\">\n      <div class=\"step-num\">03<\u002Fdiv>\n      <div class=\"step-content\">\n        <div class=\"step-title\">Thumbnail + Title + SEO<\u002Fdiv>\n        <div class=\"step-desc\">YouTube-optimised thumbnails designed for click-through in the B2B/AI niche. Title and description written for search intent. Tags, chapters, end screens — fully handled.<\u002Fdiv>\n        <div class=\"step-detail\">Thumbnail A/B options provided per video<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-step reveal reveal-d3\">\n      <div class=\"step-num\">04<\u002Fdiv>\n      <div class=\"step-content\">\n        <div class=\"step-title\">Upload, Schedule &amp; Optimise<\u002Fdiv>\n        <div class=\"step-desc\">Channel setup, posting cadence, community tab strategy, pinned comments — every touchpoint managed. You see the draft, approve it, it goes live.<\u002Fdiv>\n        <div class=\"step-detail\">4 videos/month to start (scalable)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-step reveal reveal-d4\">\n      <div class=\"step-num\">05<\u002Fdiv>\n      <div class=\"step-content\">\n        <div class=\"step-title\">Repurpose Back to Your Existing Channels<\u002Fdiv>\n        <div class=\"step-desc\">Every YouTube video yields 3–4 LinkedIn clips, 2 Instagram Reels, and a Substack embed. Your existing channels get more content, not less — as a byproduct of recording once.<\u002Fdiv>\n        <div class=\"step-detail\">1 recording session → 8–10 pieces of content<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA — no book-a-call button, just contact info -->\n<div class=\"cta-section\">\n  <h2 class=\"reveal\">Ready to turn your<br><em>best content<\u002Fem><br>into your best channel?<\u002Fh2>\n  <p class=\"reveal reveal-d1\">No new ideas needed. No extra research. Everything here is already in your Substack and LinkedIn. We just need 30 minutes to talk through what the first 90 days look like.<\u002Fp>\n  <div class=\"cta-contact reveal reveal-d2\">\n    <div class=\"from-label\">Prepared by<\u002Fdiv>\n    <div class=\"from-name\">Avi Sharma<\u002Fdiv>\n    <div class=\"from-agency\">J Curve by Avi · Full-Service Digital Marketing<\u002Fdiv>\n    <div class=\"from-email\">avi@jcurvebyavi.com<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<div class=\"footer\">\n  <span>J Curve by Avi · Confidential · May 2026<\u002Fspan>\n  <span>Prepared exclusively for Divyanshi Sharma · Growth Exe<\u002Fspan>\n<\u002Fdiv>\n\n<script>\n(function () {\n\n  /* ── Progress bar ── */\n  const bar = document.getElementById('progress');\n  function tick() {\n    const top = window.scrollY;\n    const h = document.documentElement.scrollHeight - window.innerHeight;\n    bar.style.width = (h > 0 ? (top / h) * 100 : 0) + '%';\n  }\n  window.addEventListener('scroll', tick, { passive: true });\n\n  /* ── Scroll reveal ── */\n  const els = document.querySelectorAll('.reveal');\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add('visible');\n        io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.1, rootMargin: '0px 0px -32px 0px' });\n\n  els.forEach(el => io.observe(el));\n\n  /* Fire above-fold elements immediately */\n  setTimeout(() => {\n    document.querySelectorAll('.header .reveal, .lede.reveal').forEach(el => el.classList.add('visible'));\n  }, 80);\n\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
